<div class="container vh-100 d-flex justify-content-center align-items-center">
  <div class="card shadow" style="width: 400px;">
    <div class="card-body p-4">
      <h2 class="text-center mb-3">Inventario CCL</h2>
      <p class="text-center text-muted mb-4">
        Ingresa tus credenciales
      </p>
      <form (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label for="username" class="form-label">
            Usuario
          </label>
          <input id="username" type="text" class="form-control" [(ngModel)]="credentials.username" name="username" placeholder="Usuario"
                autocomplete="username">
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">
            Contraseña
          </label>
          <input id="password" type="password" class="form-control" [(ngModel)]="credentials.password" name="password" placeholder="Contraseña" 
                autocomplete="current-password">
        </div>
        @if (errorMsg()) {
          <div class="alert alert-danger">
            {{ errorMsg() }}
          </div>
        }
        <button
          type="submit"
          class="btn btn-primary w-100"
          [disabled]="loading()">
          {{ loading() ? 'Ingresando...' : 'Ingresar' }}
        </button>
      </form>
    </div>
  </div>
</div>
